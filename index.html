<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horas</title>
  <style>
    :root {
      --bg: #0e0e14;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent-dim: #5a4fd4;
      --text: #e4e4f0;
      --muted: #7070a0;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .today-label { font-size: 13px; color: var(--muted); }
    .btn-gear {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 16px;
      transition: all 0.15s;
    }
    .btn-gear:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Layout ──────────────────────────────────── */
    .container { max-width: 760px; margin: 0 auto; padding: 24px 20px; }

    /* ── Timer Card ──────────────────────────────── */
    .timer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 24px 28px;
      text-align: center;
      margin-bottom: 24px;
    }
    .timer-display {
      font-size: 80px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      letter-spacing: -3px;
      line-height: 1;
      margin-bottom: 6px;
      transition: color 0.3s;
    }
    .timer-display.idle    { color: var(--muted); }
    .timer-display.running { color: var(--green); }
    .timer-display.paused  { color: var(--yellow); }

    .timer-status {
      font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 28px; height: 16px;
    }

    .timer-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    .btn {
      padding: 11px 26px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all 0.15s; letter-spacing: 0.2px;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-start  { background: var(--accent); color: #fff; }
    .btn-start:hover:not(:disabled) { background: #8e7ef9; }
    .btn-pause  { background: transparent; border: 1px solid var(--yellow); color: var(--yellow); }
    .btn-pause:hover:not(:disabled) { background: var(--yellow); color: #000; }
    .btn-stop   { background: transparent; border: 1px solid var(--red); color: var(--red); }
    .btn-stop:hover:not(:disabled) { background: var(--red); color: #fff; }

    .today-stats {
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: center; gap: 40px;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 22px; font-weight: 600; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

    /* ── Tabs ────────────────────────────────────── */
    .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab {
      padding: 10px 18px; background: none; border: none;
      cursor: pointer; color: var(--muted); font-size: 14px; font-weight: 500;
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Sessions ────────────────────────────────── */
    .sessions-list { display: flex; flex-direction: column; gap: 8px; }
    .session-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .session-left { display: flex; flex-direction: column; gap: 3px; }
    .session-time { font-size: 12px; color: var(--muted); }
    .session-note { font-size: 12px; color: var(--muted); font-style: italic; }
    .session-right { display: flex; align-items: center; gap: 12px; }
    .session-duration { font-weight: 600; font-variant-numeric: tabular-nums; font-size: 15px; }
    .btn-del {
      background: none; border: none; cursor: pointer;
      color: var(--border); font-size: 15px; padding: 4px; line-height: 1;
      transition: color 0.15s;
    }
    .btn-del:hover { color: var(--red); }

    /* ── Expense Form ────────────────────────────── */
    .form-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px; margin-bottom: 16px;
    }
    .form-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
    .form-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .form-control {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 9px 11px;
      color: var(--text); font-size: 14px; width: 100%;
    }
    .form-control:focus { outline: none; border-color: var(--accent); }
    .form-control::placeholder { color: var(--border); }
    .form-submit { align-self: flex-end; margin-top: 16px; }

    /* ── Expense List ────────────────────────────── */
    .expense-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin-bottom: 8px;
    }
    .expense-left { display: flex; flex-direction: column; gap: 3px; }
    .expense-desc { font-size: 14px; font-weight: 500; }
    .expense-date { font-size: 12px; color: var(--muted); }
    .expense-right { display: flex; align-items: center; gap: 12px; }
    .expense-amount { font-weight: 700; font-size: 16px; color: var(--yellow); white-space: nowrap; }

    /* ── Report ──────────────────────────────────── */
    .report-controls {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px; margin-bottom: 16px;
      display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
    }
    .summary-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px;
    }
    .summary-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px; text-align: center;
    }
    .summary-box-value { font-size: 28px; font-weight: 700; }
    .summary-box-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
    .c-accent { color: var(--accent); }
    .c-yellow { color: var(--yellow); }
    .c-green  { color: var(--green); }

    .report-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px; margin-bottom: 16px;
    }
    .report-section-title {
      font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 7px 10px; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }

    .btn-print {
      background: var(--accent); color: #fff;
      padding: 11px 24px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 14px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-print:hover { background: #8e7ef9; }

    /* ── Settings Modal ──────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px; width: 100%; max-width: 420px;
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-outline {
      background: transparent; border: 1px solid var(--border); color: var(--text);
      padding: 9px 18px; border-radius: 7px; cursor: pointer; font-size: 14px; font-weight: 500;
    }
    .btn-outline:hover { border-color: var(--accent); }

    /* ── Empty state ─────────────────────────────── */
    .empty { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }

    /* ── Note input on stop ──────────────────────── */
    .note-row { display: flex; gap: 10px; align-items: center; margin-top: 14px; }
    .note-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 11px; color: var(--text); font-size: 13px;
    }
    .note-input:focus { outline: none; border-color: var(--accent); }
    .note-input::placeholder { color: var(--border); }

    /* ════════════════════════════════════════════════
       PRINT / PDF STYLES
    ════════════════════════════════════════════════ */
    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body { background: #fff; color: #111; font-family: 'Georgia', serif; }

      .no-print { display: none !important; }

      .container { max-width: 100%; padding: 0; }

      /* Hide everything except the invoice */
      .timer-card, .tabs, #pane-sessions, #pane-expenses { display: none !important; }
      #pane-report { display: block !important; }

      .report-controls, .btn-print { display: none !important; }

      .invoice-header {
        display: flex !important;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 32px;
        padding-bottom: 20px;
        border-bottom: 2px solid #111;
      }
      .invoice-title { font-size: 36px; font-weight: 700; color: #111; }
      .invoice-meta { text-align: right; font-size: 13px; line-height: 1.7; color: #444; }
      .invoice-meta strong { color: #111; }

      .summary-grid { margin-bottom: 24px; }
      .summary-box { border: 1px solid #ddd; background: #f8f8f8 !important; }
      .summary-box-value { color: #111 !important; font-size: 22px; }
      .summary-box-label { color: #555 !important; }

      .report-section { border: 1px solid #ddd; margin-bottom: 20px; }
      .report-section-title { color: #555 !important; }
      th { color: #555 !important; border-bottom: 1px solid #ddd !important; }
      td { border-bottom: 1px solid #eee !important; }

      .invoice-footer {
        display: block !important;
        margin-top: 40px; padding-top: 20px;
        border-top: 1px solid #ddd;
        font-size: 12px; color: #888; text-align: center;
      }
    }
    .invoice-header { display: none; }
    .invoice-footer { display: none; }
  </style>
</head>
<body>

<!-- Settings Modal -->
<div class="modal-overlay no-print" id="settingsModal">
  <div class="modal">
    <div class="modal-title">Settings</div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Your Name</label>
      <input class="form-control" id="cfg-yourName" placeholder="Pedro Silva">
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Client Name</label>
      <input class="form-control" id="cfg-clientName" placeholder="Acme Corp">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Hourly Rate</label>
        <input class="form-control" id="cfg-rate" type="number" min="0" placeholder="50">
      </div>
      <div class="form-group">
        <label>Currency</label>
        <select class="form-control" id="cfg-currency">
          <option value="EUR">EUR €</option>
          <option value="USD">USD $</option>
          <option value="GBP">GBP £</option>
          <option value="BRL">BRL R$</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-start" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header no-print">
  <div class="logo">⏱ Horas</div>
  <div class="header-right">
    <span class="today-label" id="headerDate"></span>
    <button class="btn-gear" onclick="openSettings()" title="Settings">⚙</button>
  </div>
</div>

<!-- Invoice Header (print only) -->
<div class="invoice-header" id="invoiceHeader">
  <div>
    <div class="invoice-title">INVOICE</div>
    <div style="font-size:13px;color:#444;margin-top:6px" id="invoiceFrom"></div>
  </div>
  <div class="invoice-meta" id="invoiceMeta"></div>
</div>

<div class="container">

  <!-- Timer Card -->
  <div class="timer-card no-print">
    <div class="timer-display idle" id="timerDisplay">00:00:00</div>
    <div class="timer-status" id="timerStatus">ready</div>
    <div class="timer-buttons">
      <button class="btn btn-start"  id="btnStart"  onclick="timerStart()">▶ Start</button>
      <button class="btn btn-pause"  id="btnPause"  onclick="timerPause()" disabled>⏸ Pause</button>
      <button class="btn btn-stop"   id="btnStop"   onclick="timerStop()"  disabled>■ Stop</button>
    </div>
    <div class="note-row" id="noteRow" style="display:none">
      <input class="note-input" id="sessionNote" placeholder="What did you work on? (optional)" />
      <button class="btn btn-start" onclick="confirmStop()">Save</button>
      <button class="btn-outline" style="padding:8px 14px;border-radius:6px;font-size:13px" onclick="cancelStop()">Cancel</button>
    </div>
    <div class="today-stats">
      <div class="stat">
        <div class="stat-value c-accent" id="statTodayHours">0h 00m</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statWeekHours">0h 00m</div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="stat">
        <div class="stat-value c-yellow" id="statTodayExpenses">€0.00</div>
        <div class="stat-label">Expenses Today</div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs no-print">
    <button class="tab active" onclick="switchTab('sessions', this)">Sessions</button>
    <button class="tab"        onclick="switchTab('expenses', this)">Expenses</button>
    <button class="tab"        onclick="switchTab('report',   this)">Report / Invoice</button>
  </div>

  <!-- Sessions Pane -->
  <div class="tab-pane active" id="pane-sessions">
    <div class="sessions-list" id="sessionsList"></div>
  </div>

  <!-- Expenses Pane -->
  <div class="tab-pane" id="pane-expenses">
    <div class="form-card">
      <div class="form-title">Add Expense</div>
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label>Description</label>
          <input class="form-control" id="exp-desc" placeholder="Claude Pro subscription">
        </div>
        <div class="form-group">
          <label>Amount</label>
          <input class="form-control" id="exp-amount" type="number" min="0" step="0.01" placeholder="20.00">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input class="form-control" id="exp-date" type="date">
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:12px">
        <button class="btn btn-start" onclick="addExpense()">+ Add</button>
      </div>
    </div>
    <div id="expensesList"></div>
  </div>

  <!-- Report Pane -->
  <div class="tab-pane" id="pane-report">
    <div class="report-controls no-print">
      <div class="form-group">
        <label>From</label>
        <input class="form-control" id="rep-from" type="date">
      </div>
      <div class="form-group">
        <label>To</label>
        <input class="form-control" id="rep-to" type="date">
      </div>
      <button class="btn btn-start" onclick="buildReport()">Generate</button>
      <button class="btn-print" onclick="printReport()">🖨 Print / Save PDF</button>
    </div>
    <div id="reportOutput"></div>
    <div class="invoice-footer" id="invoiceFooter"></div>
  </div>

</div><!-- /container -->

<script>
// ─── Storage helpers ──────────────────────────────────────────────────────────
const S = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};

// ─── State ────────────────────────────────────────────────────────────────────
let timer = S.get('timerState') || { running: false, startTime: null, accumulated: 0 };
let sessions = S.get('sessions') || [];
let expenses = S.get('expenses') || [];
let settings = S.get('settings') || { yourName: '', clientName: 'Client', rate: 0, currency: 'EUR' };
let ticker = null;
let stopPending = false;

// ─── Utils ────────────────────────────────────────────────────────────────────
const fmtMs = ms => {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
};
const fmtHm = ms => {
  const total = Math.floor(ms / 60000);
  const h = Math.floor(total / 60);
  const m = total % 60;
  return `${h}h ${String(m).padStart(2,'0')}m`;
};
const todayStr = () => new Date().toISOString().slice(0, 10);
const weekStart = () => {
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay() + (d.getDay() === 0 ? -6 : 1));
  return d.toISOString().slice(0,10);
};
const currSymbol = c => ({ EUR: '€', USD: '$', GBP: '£', BRL: 'R$' }[c] || c);
const uid = () => Math.random().toString(36).slice(2);
const fmtMoney = (n, c) => `${currSymbol(c)}${Number(n).toFixed(2)}`;

function saveTimer()   { S.set('timerState', timer); }
function saveSessions(){ S.set('sessions', sessions); }
function saveExpenses(){ S.set('expenses', expenses); }

// ─── Timer logic ──────────────────────────────────────────────────────────────
function currentElapsed() {
  let elapsed = timer.accumulated;
  if (timer.running && timer.startTime) elapsed += Date.now() - timer.startTime;
  return elapsed;
}

function timerStart() {
  if (stopPending) return;
  timer.running = true;
  timer.startTime = Date.now();
  saveTimer();
  stopPending = false;
  startTick();
  updateUI();
}

function timerPause() {
  if (!timer.running) return;
  timer.accumulated += Date.now() - timer.startTime;
  timer.running = false;
  timer.startTime = null;
  saveTimer();
  clearInterval(ticker); ticker = null;
  updateUI();
}

function timerStop() {
  if (timer.accumulated === 0 && !timer.running) return;
  timerPause();
  stopPending = true;
  document.getElementById('noteRow').style.display = 'flex';
  document.getElementById('sessionNote').focus();
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = true;
}

function confirmStop() {
  const note = document.getElementById('sessionNote').value.trim();
  const duration = timer.accumulated;
  if (duration < 1000) { cancelStop(); return; }
  const now = new Date();
  const endTs = now.getTime();
  const startTs = endTs - duration;
  sessions.unshift({
    id: uid(),
    date: todayStr(),
    startTime: startTs,
    endTime: endTs,
    duration,
    note
  });
  saveSessions();
  // reset
  timer = { running: false, startTime: null, accumulated: 0 };
  saveTimer();
  stopPending = false;
  document.getElementById('noteRow').style.display = 'none';
  document.getElementById('sessionNote').value = '';
  updateUI();
  renderSessions();
}

function cancelStop() {
  stopPending = false;
  document.getElementById('noteRow').style.display = 'none';
  document.getElementById('sessionNote').value = '';
  updateUI();
}

function startTick() {
  if (ticker) return;
  ticker = setInterval(updateTimerDisplay, 1000);
}

// ─── Render Timer UI ──────────────────────────────────────────────────────────
function updateTimerDisplay() {
  const el = document.getElementById('timerDisplay');
  el.textContent = fmtMs(currentElapsed());
}

function updateUI() {
  const el = document.getElementById('timerDisplay');
  const statusEl = document.getElementById('timerStatus');
  const btnStart = document.getElementById('btnStart');
  const btnPause = document.getElementById('btnPause');
  const btnStop  = document.getElementById('btnStop');

  updateTimerDisplay();

  if (stopPending) return; // handled separately

  if (timer.running) {
    el.className = 'timer-display running';
    statusEl.textContent = 'running';
    btnStart.disabled = true;
    btnPause.disabled = false;
    btnStop.disabled  = false;
    startTick();
  } else if (timer.accumulated > 0) {
    el.className = 'timer-display paused';
    statusEl.textContent = 'paused';
    btnStart.textContent = '▶ Resume';
    btnStart.disabled = false;
    btnPause.disabled = true;
    btnStop.disabled  = false;
  } else {
    el.className = 'timer-display idle';
    statusEl.textContent = 'ready';
    btnStart.textContent = '▶ Start';
    btnStart.disabled = false;
    btnPause.disabled = true;
    btnStop.disabled  = true;
  }

  // Stats
  const today = todayStr();
  const wk = weekStart();
  const todayMs = sessions.filter(s => s.date === today).reduce((a, s) => a + s.duration, 0);
  const weekMs  = sessions.filter(s => s.date >= wk).reduce((a, s) => a + s.duration, 0);
  const todayExp = expenses.filter(e => e.date === today).reduce((a, e) => a + Number(e.amount), 0);

  document.getElementById('statTodayHours').textContent   = fmtHm(todayMs);
  document.getElementById('statWeekHours').textContent    = fmtHm(weekMs);
  document.getElementById('statTodayExpenses').textContent = fmtMoney(todayExp, settings.currency);
}

// ─── Sessions render ──────────────────────────────────────────────────────────
function renderSessions() {
  const container = document.getElementById('sessionsList');
  if (!sessions.length) {
    container.innerHTML = '<div class="empty">No sessions yet. Hit Start to begin.</div>';
    return;
  }
  // Group by date
  const grouped = {};
  sessions.forEach(s => { (grouped[s.date] = grouped[s.date] || []).push(s); });

  let html = '';
  Object.keys(grouped).sort((a,b) => b.localeCompare(a)).forEach(date => {
    const dayMs = grouped[date].reduce((a,s) => a + s.duration, 0);
    const label = date === todayStr() ? 'Today' : new Date(date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    html += `<div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px">
      <span style="font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px">${label}</span>
      <span style="font-size:13px;color:var(--muted)">${fmtHm(dayMs)} total</span>
    </div>`;
    grouped[date].forEach(s => {
      const start = new Date(s.startTime).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      const end   = new Date(s.endTime  ).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      html += `<div class="session-item">
        <div class="session-left">
          <span class="session-time">${start} → ${end}</span>
          ${s.note ? `<span class="session-note">${escHtml(s.note)}</span>` : ''}
        </div>
        <div class="session-right">
          <span class="session-duration">${fmtHm(s.duration)}</span>
          <button class="btn-del" onclick="deleteSession('${s.id}')" title="Delete">✕</button>
        </div>
      </div>`;
    });
  });
  container.innerHTML = html;
}

function deleteSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  saveSessions();
  renderSessions();
  updateUI();
}

// ─── Expenses ─────────────────────────────────────────────────────────────────
function addExpense() {
  const desc   = document.getElementById('exp-desc').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value);
  const date   = document.getElementById('exp-date').value || todayStr();
  if (!desc || isNaN(amount) || amount <= 0) return;
  expenses.unshift({ id: uid(), date, description: desc, amount });
  saveExpenses();
  document.getElementById('exp-desc').value   = '';
  document.getElementById('exp-amount').value = '';
  renderExpenses();
  updateUI();
}

function renderExpenses() {
  const container = document.getElementById('expensesList');
  if (!expenses.length) {
    container.innerHTML = '<div class="empty">No expenses yet.</div>';
    return;
  }
  let html = '';
  expenses.forEach(e => {
    const d = new Date(e.date+'T12:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    html += `<div class="expense-item">
      <div class="expense-left">
        <span class="expense-desc">${escHtml(e.description)}</span>
        <span class="expense-date">${d}</span>
      </div>
      <div class="expense-right">
        <span class="expense-amount">${fmtMoney(e.amount, settings.currency)}</span>
        <button class="btn-del" onclick="deleteExpense('${e.id}')" title="Delete">✕</button>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

function deleteExpense(id) {
  expenses = expenses.filter(e => e.id !== id);
  saveExpenses();
  renderExpenses();
  updateUI();
}

// ─── Report ───────────────────────────────────────────────────────────────────
function buildReport() {
  const from = document.getElementById('rep-from').value;
  const to   = document.getElementById('rep-to').value;
  if (!from || !to) { alert('Please select a date range.'); return; }

  const filtSessions = sessions.filter(s => s.date >= from && s.date <= to);
  const filtExpenses = expenses.filter(e => e.date >= from && e.date <= to);

  const totalMs  = filtSessions.reduce((a,s) => a + s.duration, 0);
  const totalHrs = totalMs / 3600000;
  const hoursAmount = totalHrs * (settings.rate || 0);
  const expTotal = filtExpenses.reduce((a,e) => a + Number(e.amount), 0);
  const grandTotal = hoursAmount + expTotal;

  const cur = settings.currency;
  const sym = currSymbol(cur);

  // Invoice meta for print
  const fromDate = new Date(from+'T12:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const toDate   = new Date(to  +'T12:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('invoiceFrom').textContent = settings.yourName ? `From: ${settings.yourName}` : '';
  document.getElementById('invoiceMeta').innerHTML = `
    <div><strong>To:</strong> ${escHtml(settings.clientName || 'Client')}</div>
    <div><strong>Period:</strong> ${fromDate} – ${toDate}</div>
    <div><strong>Generated:</strong> ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
  `;
  document.getElementById('invoiceFooter').innerHTML =
    `Thank you for your business. · ${settings.yourName || ''}`;

  // Summary boxes
  let html = `<div class="summary-grid">
    <div class="summary-box">
      <div class="summary-box-value c-accent">${fmtHm(totalMs)}</div>
      <div class="summary-box-label">Hours Worked</div>
    </div>
    <div class="summary-box">
      <div class="summary-box-value c-yellow">${fmtMoney(expTotal, cur)}</div>
      <div class="summary-box-label">Expenses</div>
    </div>
    <div class="summary-box">
      <div class="summary-box-value c-green">${fmtMoney(grandTotal, cur)}</div>
      <div class="summary-box-label">Total to Bill</div>
    </div>
  </div>`;

  // Sessions table
  if (filtSessions.length) {
    html += `<div class="report-section">
      <div class="report-section-title">Work Sessions</div>
      <table>
        <thead><tr><th>Date</th><th>Time</th><th>Duration</th><th>Notes</th>${settings.rate ? '<th style="text-align:right">Amount</th>' : ''}</tr></thead>
        <tbody>`;
    // Group by day for cleaner display
    const grouped = {};
    filtSessions.forEach(s => { (grouped[s.date] = grouped[s.date] || []).push(s); });
    Object.keys(grouped).sort().forEach(date => {
      grouped[date].forEach(s => {
        const d = new Date(date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
        const start = new Date(s.startTime).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
        const end   = new Date(s.endTime  ).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
        const amt   = ((s.duration / 3600000) * (settings.rate || 0));
        html += `<tr>
          <td>${d}</td>
          <td style="color:var(--muted);font-size:12px">${start}–${end}</td>
          <td>${fmtHm(s.duration)}</td>
          <td style="color:var(--muted)">${escHtml(s.note || '')}</td>
          ${settings.rate ? `<td style="text-align:right">${fmtMoney(amt,cur)}</td>` : ''}
        </tr>`;
      });
    });
    if (settings.rate) {
      html += `<tr style="font-weight:600">
        <td colspan="4" style="text-align:right;padding-top:12px">Subtotal (${totalHrs.toFixed(2)}h × ${sym}${settings.rate}/h)</td>
        <td style="text-align:right;padding-top:12px">${fmtMoney(hoursAmount,cur)}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  // Expenses table
  if (filtExpenses.length) {
    html += `<div class="report-section">
      <div class="report-section-title">Expenses</div>
      <table>
        <thead><tr><th>Date</th><th>Description</th><th style="text-align:right">Amount</th></tr></thead>
        <tbody>`;
    filtExpenses.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(e => {
      const d = new Date(e.date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
      html += `<tr>
        <td>${d}</td>
        <td>${escHtml(e.description)}</td>
        <td style="text-align:right">${fmtMoney(e.amount,cur)}</td>
      </tr>`;
    });
    html += `<tr style="font-weight:600">
      <td colspan="2" style="text-align:right;padding-top:12px">Expenses Total</td>
      <td style="text-align:right;padding-top:12px">${fmtMoney(expTotal,cur)}</td>
    </tr></tbody></table></div>`;
  }

  // Grand total row
  html += `<div class="report-section" style="background:var(--surface2)">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:15px;font-weight:700">TOTAL DUE</span>
      <span style="font-size:24px;font-weight:700;color:var(--green)">${fmtMoney(grandTotal,cur)}</span>
    </div>
  </div>`;

  document.getElementById('reportOutput').innerHTML = html;
}

function printReport() {
  const from = document.getElementById('rep-from').value;
  const to   = document.getElementById('rep-to').value;
  if (!document.getElementById('reportOutput').innerHTML) {
    if (!from || !to) { alert('Generate a report first.'); return; }
    buildReport();
  }
  window.print();
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-' + name).classList.add('active');
}

// ─── Settings ─────────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('cfg-yourName').value   = settings.yourName   || '';
  document.getElementById('cfg-clientName').value = settings.clientName || '';
  document.getElementById('cfg-rate').value       = settings.rate       || '';
  document.getElementById('cfg-currency').value   = settings.currency   || 'EUR';
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}
function saveSettings() {
  settings.yourName   = document.getElementById('cfg-yourName').value.trim();
  settings.clientName = document.getElementById('cfg-clientName').value.trim() || 'Client';
  settings.rate       = parseFloat(document.getElementById('cfg-rate').value) || 0;
  settings.currency   = document.getElementById('cfg-currency').value;
  S.set('settings', settings);
  closeSettings();
  updateUI();
}

// ─── Escape HTML ──────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  // Header date
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // Default expense date to today
  document.getElementById('exp-date').value = todayStr();

  // Default report range: current month
  const now = new Date();
  const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('rep-from').value = `${y}-${m}-01`;
  document.getElementById('rep-to').value   = todayStr();

  // Restore running timer if page was refreshed mid-session
  if (timer.running && timer.startTime) {
    startTick();
  }

  // Close modal on overlay click
  document.getElementById('settingsModal').addEventListener('click', function(e) {
    if (e.target === this) closeSettings();
  });

  updateUI();
  renderSessions();
  renderExpenses();
})();
</script>
</body>
</html>
